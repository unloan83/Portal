<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Workflow Output Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto auto;
            gap: 15px;
            align-items: end;
        }

        .controls label {
            display: block;
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .controls input,
        .controls select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            width: 100%;
        }

        .controls button {
            padding: 12px 24px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            height: fit-content;
        }

        .controls button:hover {
            background: #218838;
        }

        .refresh-btn {
            background: #667eea !important;
        }

        .refresh-btn:hover {
            background: #764ba2 !important;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .workflow-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .workflow-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .workflow-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-bottom: 4px solid #ffc107;
        }

        .workflow-repo {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .workflow-repo a {
            color: white;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .workflow-repo a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .workflow-name {
            font-size: 0.95em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .workflow-status {
            display: flex;
            gap: 10px;
            font-size: 0.9em;
            flex-wrap: wrap;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85em;
        }

        .status-success {
            background: rgba(81, 207, 102, 0.3);
            color: white;
            border: 1px solid rgba(81, 207, 102, 0.5);
        }

        .status-failure {
            background: rgba(255, 107, 107, 0.3);
            color: white;
            border: 1px solid rgba(255, 107, 107, 0.5);
        }

        .status-in-progress {
            background: rgba(255, 193, 7, 0.3);
            color: white;
            border: 1px solid rgba(255, 193, 7, 0.5);
        }

        .workflow-time {
            font-size: 0.85em;
            opacity: 0.8;
        }

        .workflow-content {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
            max-height: 600px;
        }

        .output-container {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 6px;
            font-size: 0.9em;
            line-height: 1.6;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            border-left: 3px solid #667eea;
            max-height: 500px;
            overflow-y: auto;
        }

        .output-title {
            font-weight: bold;
            color: #4fc3f7;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
        }

        .empty-state {
            color: #999;
            font-style: italic;
            padding: 20px;
            text-align: center;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .success {
            background: #51cf66;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .config-list {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .config-list h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .config-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
        }

        .config-item {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .config-item-info {
            flex: 1;
        }

        .config-item-name {
            font-weight: bold;
            color: #333;
        }

        .config-item-workflow {
            font-size: 0.85em;
            color: #666;
        }

        .remove-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            transition: background 0.3s;
            margin-left: 10px;
        }

        .remove-btn:hover {
            background: #c82333;
        }

        .token-info {
            background: #fffacd;
            border: 1px solid #ffc107;
            color: #333;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ GitHub Workflow Output Portal</h1>
            <p>Monitor workflow execution outputs and logs in one dashboard</p>
        </header>

        <div class="token-info">
            💡 <strong>Tip:</strong> Create a GitHub Personal Access Token with 'repo' scope for private repositories: <a href="https://github.com/settings/tokens" target="_blank">Generate Token</a>
        </div>

        <div class="controls">
            <div>
                <label>Repository (owner/name)</label>
                <input type="text" id="repoInput" placeholder="e.g., unloan83/Portfolio">
            </div>
            <div>
                <label>Workflow File Name</label>
                <input type="text" id="workflowInput" placeholder="e.g., stocks.yml or main.yaml">
            </div>
            <div>
                <label>Category/Purpose</label>
                <input type="text" id="purposeInput" placeholder="e.g., Stock Analysis, Reports, etc.">
            </div>
            <div>
                <label>GitHub Token</label>
                <input type="password" id="tokenInput" placeholder="github_pat_xxx (optional)">
            </div>
            <button onclick="addWorkflow()">Add Workflow</button>
            <button class="refresh-btn" onclick="refreshData()">🔄 Refresh</button>
        </div>

        <div id="configList"></div>
        <div id="statusMessage"></div>
        <div id="dashboard"></div>
    </div>

    <script>
        let workflows = [];
        let token = localStorage.getItem('workflow_token') || '';

        // Load workflows from localStorage
        function loadWorkflows() {
            const saved = localStorage.getItem('workflow_configs');
            if (saved) {
                workflows = JSON.parse(saved);
                displayConfigList();
                loadAllWorkflows();
            }
        }

        // Save workflows to localStorage
        function saveWorkflows() {
            localStorage.setItem('workflow_configs', JSON.stringify(workflows));
        }

        // Add workflow
        function addWorkflow() {
            const repoInput = document.getElementById('repoInput');
            const workflowInput = document.getElementById('workflowInput');
            const purposeInput = document.getElementById('purposeInput');
            const tokenInput = document.getElementById('tokenInput');

            const repo = repoInput.value.trim();
            const workflow = workflowInput.value.trim();
            const purpose = purposeInput.value.trim() || 'Workflow Output';
            const newToken = tokenInput.value.trim();

            if (!repo || !repo.includes('/')) {
                showStatus('❌ Please enter repository in format: owner/name', 'error');
                return;
            }

            if (!workflow) {
                showStatus('❌ Please enter workflow file name (e.g., main.yml)', 'error');
                return;
            }

            if (newToken) {
                token = newToken;
                localStorage.setItem('workflow_token', token);
            }

            if (workflows.some(w => w.repo === repo && w.workflow === workflow)) {
                showStatus('⚠️ This workflow is already added!', 'error');
                return;
            }

            workflows.push({
                repo,
                workflow,
                purpose,
                id: Date.now()
            });

            saveWorkflows();
            repoInput.value = '';
            workflowInput.value = '';
            purposeInput.value = '';
            tokenInput.value = '';

            displayConfigList();
            loadAllWorkflows();
            showStatus('✅ Workflow added successfully!', 'success');
        }

        // Remove workflow
        function removeWorkflow(id) {
            workflows = workflows.filter(w => w.id !== id);
            saveWorkflows();
            displayConfigList();
            loadAllWorkflows();
            showStatus('✅ Workflow removed!', 'success');
        }

        // Display config list
        function displayConfigList() {
            const configList = document.getElementById('configList');

            if (workflows.length === 0) {
                configList.innerHTML = '';
                return;
            }

            let html = '<div class="config-list"><h3>📋 Configured Workflows</h3><div class="config-items">';

            workflows.forEach(w => {
                html += `
                    <div class="config-item">
                        <div class="config-item-info">
                            <div class="config-item-name">${w.repo}</div>
                            <div class="config-item-workflow">${w.workflow}</div>
                            <div class="config-item-workflow" style="color: #999; font-size: 0.75em;">📂 ${w.purpose}</div>
                        </div>
                        <button class="remove-btn" onclick="removeWorkflow(${w.id})">Remove</button>
                    </div>
                `;
            });

            html += '</div></div>';
            configList.innerHTML = html;
        }

        // Show status message
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.innerHTML = `<div class="${type}">${message}</div>`;
            setTimeout(() => {
                statusDiv.innerHTML = '';
            }, 4000);
        }

        // Fetch workflow runs
        async function fetchWorkflowRuns(owner, repo, workflow) {
            try {
                const headers = {
                    'Accept': 'application/vnd.github.v3+json'
                };

                if (token) {
                    headers['Authorization'] = `token ${token}`;
                }

                // Get workflow ID first
                const workflowsRes = await fetch(
                    `https://api.github.com/repos/${owner}/${repo}/actions/workflows`,
                    { headers }
                );
                const workflowsData = await workflowsRes.json();

                if (!workflowsData.workflows) {
                    return null;
                }

                // Find matching workflow
                const matchedWorkflow = workflowsData.workflows.find(w =>
                    w.name === workflow || w.path.includes(workflow)
                );

                if (!matchedWorkflow) {
                    console.log(`Workflow not found: ${workflow}`);
                    return null;
                }

                // Get latest runs for this workflow
                const runsRes = await fetch(
                    `https://api.github.com/repos/${owner}/${repo}/actions/workflows/${matchedWorkflow.id}/runs?per_page=1`,
                    { headers }
                );
                const runsData = await runsRes.json();

                if (!runsData.workflow_runs || runsData.workflow_runs.length === 0) {
                    return null;
                }

                const latestRun = runsData.workflow_runs[0];

                // Get job details
                const jobsRes = await fetch(
                    `https://api.github.com/repos/${owner}/${repo}/actions/runs/${latestRun.id}/jobs`,
                    { headers }
                );
                const jobsData = await jobsRes.json();

                let logs = '';

                // Get logs from each job
                if (jobsData.jobs) {
                    for (const job of jobsData.jobs) {
                        const logsRes = await fetch(
                            `https://api.github.com/repos/${owner}/${repo}/actions/jobs/${job.id}/logs`,
                            { headers }
                        );
                        const jobLogs = await logsRes.text();
                        logs += jobLogs;
                    }
                }

                return {
                    workflow: matchedWorkflow,
                    run: latestRun,
                    logs: logs,
                    jobs: jobsData.jobs || []
                };
            } catch (error) {
                console.error(`Error fetching workflow for ${owner}/${repo}:`, error);
                return null;
            }
        }

        // Load all workflows
        async function loadAllWorkflows() {
            if (workflows.length === 0) {
                document.getElementById('dashboard').innerHTML = `
                    <div style="grid-column: 1/-1;">
                        <div class="loading">
                            <p style="font-size: 1.2em;">👆 Add workflows above to get started</p>
                        </div>
                    </div>
                `;
                return;
            }

            document.getElementById('dashboard').innerHTML = `
                <div style="grid-column: 1/-1;">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading ${workflows.length} workflow(s)...</p>
                    </div>
                </div>
            `;

            const allData = await Promise.all(
                workflows.map(async (workflowObj) => {
                    const [owner, repo] = workflowObj.repo.split('/');
                    const data = await fetchWorkflowRuns(owner, repo, workflowObj.workflow);
                    return data ? { ...workflowObj, ...data } : null;
                })
            );

            renderDashboard(allData.filter(d => d !== null));
        }

        // Render dashboard
        function renderDashboard(data) {
            const dashboard = document.getElementById('dashboard');

            if (data.length === 0) {
                dashboard.innerHTML = '<div style="grid-column: 1/-1;"><div class="error">❌ Could not find any workflows. Check repository and workflow file names.</div></div>';
                return;
            }

            dashboard.innerHTML = `
                <div style="grid-column: 1/-1; display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px;">
                    ${data.map(workflowData => createWorkflowCard(workflowData)).join('')}
                </div>
            `;
        }

        // Create workflow card
        function createWorkflowCard(workflowData) {
            const { repo, workflow, purpose, run, logs } = workflowData;
            const [owner, repoName] = repo.split('/');

            const statusClass = run.conclusion === 'success' ? 'status-success' :
                run.conclusion === 'failure' ? 'status-failure' : 'status-in-progress';

            const statusText = run.conclusion ? run.conclusion.toUpperCase() : 'IN PROGRESS';

            const runDate = new Date(run.created_at).toLocaleString();
            const runDuration = run.run_number ? `Run #${run.run_number}` : 'Latest';

            // Clean up logs for display
            let displayLogs = logs;
            if (displayLogs.length > 5000) {
                displayLogs = displayLogs.substring(displayLogs.length - 5000) + '\n... (truncated)';
            }

            return `
                <div class="workflow-card">
                    <div class="workflow-header">
                        <div class="workflow-repo">
                            <a href="https://github.com/${repo}" target="_blank">📦 ${repo}</a>
                        </div>
                        <div class="workflow-name">Workflow: ${workflow}</div>
                        <div class="workflow-name" style="font-size: 0.9em; opacity: 0.8;">📂 ${purpose}</div>
                        <div class="workflow-status">
                            <span class="status-badge ${statusClass}">🔄 ${statusText}</span>
                            <span class="workflow-time">${runDate}</span>
                            <span class="workflow-time">${runDuration}</span>
                        </div>
                    </div>
                    <div class="workflow-content">
                        ${logs ? `
                            <div class="output-title">📋 Execution Output:</div>
                            <div class="output-container">${escapeHtml(displayLogs)}</div>
                        ` : '<div class="empty-state">No output logs available</div>'}
                    </div>
                </div>
            `;
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Refresh data
        function refreshData() {
            if (workflows.length === 0) {
                showStatus('⚠️ No workflows configured', 'error');
                return;
            }
            loadAllWorkflows();
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', loadWorkflows);
    </script>
</body>
</html>
